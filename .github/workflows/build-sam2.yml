name: Build sam2

on:
  push:
    branches: [main]
    paths:
      - 'sam2/**'
      - '!sam2/**/*.md'
      - '.github/workflows/build-sam2.yml'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Optional version tag (e.g. v0.1.0); applied as image tag if set'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bradleylab/sam2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space (CUDA images are big)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          docker system prune -af --volumes || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
            type=raw,value=${{ inputs.version_tag }},enable=${{ inputs.version_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: sam2
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
