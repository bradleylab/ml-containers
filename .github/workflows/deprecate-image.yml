name: Deprecate image (tag :deprecated)

# Manually re-tags a superseded image's existing manifest as :deprecated
# (server-side copy, no rebuild). Use after renaming or replacing an image
# so the old GHCR package signals "still pullable, do not start new work
# against it" (per ~/.claude/rules/ml-containers.md tag conventions).
# Runs in CI so nothing is pushed from a laptop.

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name under ghcr.io/bradleylab (e.g. mars-bench)'
        required: true
      source_tag:
        description: 'Existing tag whose manifest :deprecated should point at'
        required: true
        default: 'v1'

env:
  REGISTRY: ghcr.io

jobs:
  tag-deprecated:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tag ${{ inputs.image }}:${{ inputs.source_tag }} as :deprecated
        run: |
          docker buildx imagetools create \
            --tag "${REGISTRY}/bradleylab/${{ inputs.image }}:deprecated" \
            "${REGISTRY}/bradleylab/${{ inputs.image }}:${{ inputs.source_tag }}"
          echo "Tagged ${REGISTRY}/bradleylab/${{ inputs.image }}:deprecated"
